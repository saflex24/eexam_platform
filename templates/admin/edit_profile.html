{% extends "base.html" %}

{% block title %}Edit Profile - E-Exam Platform{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4><i class="fas fa-edit"></i> Edit Profile</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <!-- Profile Picture -->
                        <div class="text-center mb-4">
                            {% if admin.profile_picture %}
                            <img src="{{ url_for('static', filename='uploads/profile_pictures/' + admin.profile_picture) }}" 
                                 class="rounded-circle mb-3" width="120" height="120" alt="Profile Picture">
                            {% else %}
                            <div class="rounded-circle bg-primary text-white d-inline-flex align-items-center justify-content-center mb-3" 
                                 style="width: 120px; height: 120px; font-size: 2.5rem;">
                                {{ admin.first_name[0] }}{{ admin.last_name[0] }}
                            </div>
                            {% endif %}
                            <div>
                                <label for="profile_picture" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-camera"></i> Change Picture
                                </label>
                                <input type="file" id="profile_picture" name="profile_picture" class="d-none" accept="image/*">
                            </div>
                        </div>
                        
                        <!-- First Name -->
                        <div class="mb-3">
                            <label for="first_name" class="form-label">First Name *</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" 
                                   value="{{ admin.first_name }}" required>
                        </div>
                        
                        <!-- Last Name -->
                        <div class="mb-3">
                            <label for="last_name" class="form-label">Last Name *</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" 
                                   value="{{ admin.last_name }}" required>
                        </div>
                        
                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Username *</label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   value="{{ admin.username }}" required>
                            <small class="text-muted">Used for login</small>
                        </div>
                        
                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   value="{{ admin.email or '' }}">
                            <small class="text-muted">Optional - used for notifications</small>
                        </div>
                        
                        <!-- Gender -->
                        <div class="mb-3">
                            <label for="gender" class="form-label">Gender</label>
                            <select class="form-select" id="gender" name="gender">
                                <option value="Male" {% if admin.gender == 'Male' %}selected{% endif %}>Male</option>
                                <option value="Female" {% if admin.gender == 'Female' %}selected{% endif %}>Female</option>
                                <option value="Other" {% if admin.gender == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                        
                        <!-- Buttons -->
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('admin.admin_profile') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
